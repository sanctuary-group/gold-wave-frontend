<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - BOAT PREDICTOR ADMIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1e293b' } } } }
    }
  </script>
</head>
<body class="bg-[#0a0e1a] text-slate-100 min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- ページヘッダー -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">
        <i class="fa-solid fa-gauge-high text-amber-500 mr-2"></i>ダッシュボード
      </h1>
    </div>

    <!-- サマリーカード -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-gray-900 rounded-xl border border-slate-700/50 p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-sky-500/10 flex items-center justify-center">
            <i class="fa-solid fa-users text-sky-500"></i>
          </div>
          <div>
            <p class="text-xs text-slate-400">総ユーザー</p>
            <p class="text-2xl font-bold text-white" id="total-users">0</p>
          </div>
        </div>
      </div>
      <div class="bg-gray-900 rounded-xl border border-slate-700/50 p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-green-500/10 flex items-center justify-center">
            <i class="fa-brands fa-line text-green-500"></i>
          </div>
          <div>
            <p class="text-xs text-slate-400">LINE登録</p>
            <p class="text-2xl font-bold text-white" id="line-users">0</p>
          </div>
        </div>
      </div>
      <div class="bg-gray-900 rounded-xl border border-slate-700/50 p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-purple-500/10 flex items-center justify-center">
            <i class="fa-solid fa-share-nodes text-purple-500"></i>
          </div>
          <div>
            <p class="text-xs text-slate-400">SNS登録</p>
            <p class="text-2xl font-bold text-white" id="sns-users">0</p>
          </div>
        </div>
      </div>
      <div class="bg-gray-900 rounded-xl border border-slate-700/50 p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-amber-500/10 flex items-center justify-center">
            <i class="fa-solid fa-credit-card text-amber-500"></i>
          </div>
          <div>
            <p class="text-xs text-slate-400">決済完了</p>
            <p class="text-2xl font-bold text-white" id="paid-users">0</p>
          </div>
        </div>
      </div>
    </div>

    <!-- タブ切替 -->
    <div class="border-b border-slate-700 mb-6">
      <div class="flex gap-0">
        <button id="tab-users" onclick="switchTab('users')"
          class="px-6 py-3 text-sm font-medium border-b-2 border-sky-500 text-sky-400 transition">
          <i class="fa-solid fa-users mr-2"></i>ユーザー管理
        </button>
        <button id="tab-logics" onclick="switchTab('logics')"
          class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-300 transition">
          <i class="fa-solid fa-brain mr-2"></i>ロジック管理
        </button>
      </div>
    </div>

    <!-- ユーザー管理タブ -->
    <section id="panel-users">
      <!-- 検索・フィルター -->
      <div class="flex flex-wrap gap-3 mb-4">
        <div class="flex-1 min-w-[200px]">
          <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" placeholder="名前やメールで検索..." id="user-search"
              oninput="filterUsers()"
              class="w-full bg-slate-800 border border-slate-600 rounded-lg pl-10 pr-4 py-2.5 text-white text-sm placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition">
          </div>
        </div>
        <select id="filter-method" onchange="filterUsers()"
          class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2.5 text-white text-sm focus:border-sky-500 focus:outline-none transition">
          <option value="all">登録方法: 全て</option>
          <option value="LINE">LINE</option>
          <option value="SNS">SNS</option>
        </select>
        <select id="filter-status" onchange="filterUsers()"
          class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2.5 text-white text-sm focus:border-sky-500 focus:outline-none transition">
          <option value="all">ステータス: 全て</option>
          <option value="有効">有効</option>
          <option value="停止">停止</option>
          <option value="保留">保留</option>
        </select>
      </div>

      <!-- ユーザーテーブル -->
      <div class="bg-gray-900 rounded-xl border border-slate-700/50 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full min-w-[700px]">
            <thead>
              <tr class="bg-slate-800/50">
                <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">ID</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">名前</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">メール</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase">登録方法</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase">ステータス</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase">決済</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase">登録日</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase">操作</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
            </tbody>
          </table>
        </div>
      </div>

      <!-- ページネーション -->
      <div class="flex items-center justify-between mt-4">
        <p class="text-sm text-slate-400" id="user-count"></p>
        <div class="flex items-center gap-1">
          <button class="px-3 py-1.5 rounded-lg text-sm bg-slate-800 text-slate-400 hover:bg-slate-700 transition">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="px-3 py-1.5 rounded-lg text-sm bg-sky-500 text-white">1</button>
          <button class="px-3 py-1.5 rounded-lg text-sm bg-slate-800 text-slate-400 hover:bg-slate-700 transition">2</button>
          <button class="px-3 py-1.5 rounded-lg text-sm bg-slate-800 text-slate-400 hover:bg-slate-700 transition">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- ロジック管理タブ -->
    <section id="panel-logics" class="hidden">
      <div class="space-y-4">
        <!-- ロジックカード -->
        <div id="logic-list"></div>

        <!-- 新規追加ボタン -->
        <button onclick="openLogicModal()"
          class="w-full border-2 border-dashed border-slate-600 rounded-xl p-6 text-center hover:border-sky-500 hover:text-sky-400 text-slate-400 transition group">
          <i class="fa-solid fa-plus text-2xl mb-2 group-hover:text-sky-500 transition"></i>
          <p class="font-medium">新規ロジック追加</p>
        </button>
      </div>
    </section>

  </main>

  <!-- ロジック追加モーダル -->
  <div id="logic-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeLogicModal()"></div>
    <div class="relative bg-gray-900 rounded-2xl border border-slate-700 p-6 sm:p-8 w-full max-w-lg shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-bold text-white">
          <i class="fa-solid fa-brain text-sky-500 mr-2"></i>新規ロジック追加
        </h3>
        <button onclick="closeLogicModal()" class="text-slate-400 hover:text-white transition">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <form onsubmit="handleLogicSubmit(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">ロジック名</label>
          <input type="text" placeholder="例: ロジックD"
            class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white text-sm placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">説明</label>
          <textarea rows="2" placeholder="ロジックの説明を入力"
            class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white text-sm placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition resize-none"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-3">パラメータ重み設定</label>
          <div class="space-y-3">
            <div class="flex items-center justify-between">
              <span class="text-sm text-slate-400">勝率重み</span>
              <div class="flex items-center gap-2">
                <input type="range" min="0" max="100" value="80" class="w-32 accent-sky-500">
                <span class="text-sm font-mono text-white w-12 text-right">0.80</span>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-slate-400">モーター重み</span>
              <div class="flex items-center gap-2">
                <input type="range" min="0" max="100" value="50" class="w-32 accent-sky-500">
                <span class="text-sm font-mono text-white w-12 text-right">0.50</span>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-slate-400">STタイミング重み</span>
              <div class="flex items-center gap-2">
                <input type="range" min="0" max="100" value="30" class="w-32 accent-sky-500">
                <span class="text-sm font-mono text-white w-12 text-right">0.30</span>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-slate-400">展示タイム重み</span>
              <div class="flex items-center gap-2">
                <input type="range" min="0" max="100" value="40" class="w-32 accent-sky-500">
                <span class="text-sm font-mono text-white w-12 text-right">0.40</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeLogicModal()"
            class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-medium py-2.5 px-4 rounded-xl transition">
            キャンセル
          </button>
          <button type="submit"
            class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-medium py-2.5 px-4 rounded-xl transition">
            <i class="fa-solid fa-save mr-1"></i>保存
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../shared/dummy-data.js"></script>
  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      updateSummary();
      renderUsersTable(DUMMY_USERS);
      renderLogicList();
      initSliders();
    });

    // サマリー更新
    function updateSummary() {
      document.getElementById('total-users').textContent = DUMMY_USERS.length;
      document.getElementById('line-users').textContent = DUMMY_USERS.filter(u => u.method === 'LINE').length;
      document.getElementById('sns-users').textContent = DUMMY_USERS.filter(u => u.method === 'SNS').length;
      document.getElementById('paid-users').textContent = DUMMY_USERS.filter(u => u.payment === '決済済').length;
    }

    // タブ切替
    function switchTab(tab) {
      const tabs = ['users', 'logics'];
      tabs.forEach(t => {
        document.getElementById('tab-' + t).className = t === tab
          ? 'px-6 py-3 text-sm font-medium border-b-2 border-sky-500 text-sky-400 transition'
          : 'px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-300 transition';
        document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
      });
    }

    // ユーザーテーブル描画
    function renderUsersTable(users) {
      const tbody = document.getElementById('users-table-body');
      tbody.innerHTML = users.map(user => {
        const methodIcon = user.method === 'LINE'
          ? '<i class="fa-brands fa-line text-green-500 mr-1"></i>'
          : '<i class="fa-solid fa-share-nodes text-purple-500 mr-1"></i>';
        return `
          <tr class="border-b border-slate-700/50 hover:bg-slate-800/30 transition">
            <td class="px-4 py-3 text-sm text-slate-400 font-mono">${user.id}</td>
            <td class="px-4 py-3 text-white font-medium">${user.name}</td>
            <td class="px-4 py-3 text-sm text-slate-300">${user.email}</td>
            <td class="px-4 py-3 text-center text-sm">${methodIcon}${user.method}</td>
            <td class="px-4 py-3 text-center">${getStatusBadge(user.status)}</td>
            <td class="px-4 py-3 text-center">${getStatusBadge(user.payment)}</td>
            <td class="px-4 py-3 text-center text-sm text-slate-400">${user.registered}</td>
            <td class="px-4 py-3 text-center">
              <button class="text-slate-400 hover:text-white transition p-1" title="詳細">
                <i class="fa-solid fa-ellipsis-vertical"></i>
              </button>
            </td>
          </tr>`;
      }).join('');
      document.getElementById('user-count').textContent = `${users.length}件のユーザー`;
    }

    // ユーザーフィルター
    function filterUsers() {
      const search = document.getElementById('user-search').value.toLowerCase();
      const method = document.getElementById('filter-method').value;
      const status = document.getElementById('filter-status').value;

      let filtered = DUMMY_USERS;
      if (search) {
        filtered = filtered.filter(u =>
          u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search)
        );
      }
      if (method !== 'all') {
        filtered = filtered.filter(u => u.method === method);
      }
      if (status !== 'all') {
        filtered = filtered.filter(u => u.status === status);
      }
      renderUsersTable(filtered);
    }

    // ロジック一覧描画
    function renderLogicList() {
      const container = document.getElementById('logic-list');
      container.innerHTML = DUMMY_LOGICS.map(logic => `
        <div class="bg-gray-900 rounded-xl border border-slate-700/50 p-5">
          <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <h3 class="text-lg font-bold text-white">${logic.name}</h3>
                ${getStatusBadge(logic.status)}
              </div>
              <p class="text-sm text-slate-400">${logic.description}</p>
            </div>
            <div class="flex gap-2">
              <button class="px-3 py-1.5 rounded-lg text-sm bg-slate-800 text-sky-400 hover:bg-sky-500/10 transition">
                <i class="fa-solid fa-pen-to-square mr-1"></i>編集
              </button>
              <button class="px-3 py-1.5 rounded-lg text-sm bg-slate-800 text-red-400 hover:bg-red-500/10 transition">
                <i class="fa-solid fa-ban mr-1"></i>無効化
              </button>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500">的中率</span>
            <div class="flex-1 bg-slate-700 rounded-full h-2">
              <div class="bg-amber-400 h-2 rounded-full" style="width: ${logic.accuracy}%"></div>
            </div>
            <span class="text-sm font-mono font-bold text-amber-400">${logic.accuracy}%</span>
          </div>
        </div>
      `).join('');
    }

    // モーダル
    function openLogicModal() {
      document.getElementById('logic-modal').classList.remove('hidden');
    }

    function closeLogicModal() {
      document.getElementById('logic-modal').classList.add('hidden');
    }

    function handleLogicSubmit(e) {
      e.preventDefault();
      closeLogicModal();
    }

    // スライダー値表示
    function initSliders() {
      document.querySelectorAll('#logic-modal input[type="range"]').forEach(slider => {
        const display = slider.parentElement.querySelector('span');
        slider.addEventListener('input', () => {
          display.textContent = (slider.value / 100).toFixed(2);
        });
      });
    }
  </script>
</body>
</html>
