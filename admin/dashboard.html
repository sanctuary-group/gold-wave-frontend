<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - GOLD WAVE ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark text-charcoal font-body min-h-screen flex flex-col bg-pattern-subtle">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- ページヘッダー -->
    <div class="mb-6">
      <div class="flex items-center justify-between">
        <h1 class="text-3xl sm:text-4xl font-heading font-semibold tracking-tight text-charcoal">
          <i class="fa-solid fa-gauge-high text-gold-shine mr-2"></i>ダッシュボード
        </h1>
        <span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-status-purple-bg text-status-purple">準備中</span>
      </div>
    </div>

    <!-- 準備中コンテンツ -->
    <div class="card-gold-accent overflow-hidden">
      <div class="px-5 sm:px-7 py-20 flex flex-col items-center justify-center text-center">
        <div class="w-24 h-24 rounded-full bg-dark-surface/80 flex items-center justify-center mb-6">
          <i class="fa-solid fa-screwdriver-wrench text-gold/40 text-4xl"></i>
        </div>
        <h2 class="text-2xl font-heading font-semibold text-charcoal mb-3">管理機能は準備中です</h2>
        <p class="text-sm text-warm-gray max-w-md mb-8">ユーザー管理・ロジック管理・ダッシュボード統計機能は今後のアップデートで対応予定です。</p>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full max-w-lg">
          <div class="card-premium p-4 opacity-60">
            <i class="fa-solid fa-users text-gold/40 text-lg mb-2"></i>
            <p class="text-xs text-warm-gray">ユーザー管理</p>
          </div>
          <div class="card-premium p-4 opacity-60">
            <i class="fa-solid fa-brain text-gold/40 text-lg mb-2"></i>
            <p class="text-xs text-warm-gray">ロジック管理</p>
          </div>
          <div class="card-premium p-4 opacity-60">
            <i class="fa-solid fa-chart-line text-gold/40 text-lg mb-2"></i>
            <p class="text-xs text-warm-gray">統計ダッシュボード</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
</body>
</html>
