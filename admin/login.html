<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン - BOAT PREDICTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark bg-pattern-subtle text-charcoal font-body min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- ログインカード -->
      <div class="card-premium p-10">
        <!-- ロゴ -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-b from-gold/12 to-gold/4 mb-5">
            <i class="fa-solid fa-shield-halved text-gold-shine text-2xl"></i>
          </div>
          <h1 class="text-3xl tracking-tight font-bold">
            <span class="text-gold-gradient font-heading">BOAT</span>
            <span class="text-charcoal font-heading">PREDICTOR</span>
            <span class="text-gold-dark text-xs ml-2 px-2 py-1 bg-gold/8 rounded-md align-middle font-semibold tracking-wider uppercase">ADMIN</span>
          </h1>
          <p class="text-warm-gray/80 text-sm mt-2">管理者ログイン</p>
        </div>

        <!-- フォーム -->
        <form onsubmit="handleAdminLogin(event)" class="space-y-5">
          <!-- 管理者ID -->
          <div>
            <label class="block text-sm font-medium text-warm-text mb-2">
              <i class="fa-solid fa-user-shield mr-1 text-warm-gray"></i>管理者ID
            </label>
            <input type="text" placeholder="管理者IDを入力"
              class="input-premium">
          </div>

          <!-- パスワード -->
          <div>
            <label class="block text-sm font-medium text-warm-text mb-2">
              <i class="fa-solid fa-lock mr-1 text-warm-gray"></i>パスワード
            </label>
            <div class="relative">
              <input type="password" id="admin-password" placeholder="パスワードを入力"
                class="input-premium pr-12">
              <button type="button" onclick="toggleAdminPassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-warm-gray hover:text-charcoal transition">
                <i id="admin-password-toggle-icon" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- ログインボタン -->
          <button type="submit"
            class="w-full btn-primary">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>管理者ログイン
          </button>
        </form>

        <!-- ユーザーログインへ -->
        <div class="mt-6 text-center">
          <a href="../user/login.html" class="text-sm text-warm-gray/60 hover:text-warm-gray transition-all duration-400">
            <i class="fa-solid fa-arrow-left mr-1"></i>ユーザーログインへ戻る
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="../shared/header.js"></script>
  <script>
    function toggleAdminPassword() {
      const input = document.getElementById('admin-password');
      const icon = document.getElementById('admin-password-toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    function handleAdminLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
