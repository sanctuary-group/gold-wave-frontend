<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン - BOAT PREDICTOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1e293b' } } } }
    }
  </script>
</head>
<body class="bg-[#070a12] text-slate-100 min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- ログインカード -->
      <div class="bg-gray-900 rounded-2xl shadow-2xl border border-slate-700/50 p-8">
        <!-- ロゴ -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-amber-500/10 border border-amber-500/30 mb-4">
            <i class="fa-solid fa-shield-halved text-amber-500 text-2xl"></i>
          </div>
          <h1 class="text-2xl font-bold">
            <span class="text-sky-500">BOAT</span>
            <span class="text-white">PREDICTOR</span>
            <span class="text-amber-400 text-sm ml-1 px-1.5 py-0.5 border border-amber-400/50 rounded align-middle">ADMIN</span>
          </h1>
          <p class="text-slate-400 text-sm mt-2">管理者ログイン</p>
        </div>

        <!-- フォーム -->
        <form onsubmit="handleAdminLogin(event)" class="space-y-5">
          <!-- 管理者ID -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">
              <i class="fa-solid fa-user-shield mr-1 text-slate-500"></i>管理者ID
            </label>
            <input type="text" placeholder="管理者IDを入力"
              class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none transition">
          </div>

          <!-- パスワード -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">
              <i class="fa-solid fa-lock mr-1 text-slate-500"></i>パスワード
            </label>
            <div class="relative">
              <input type="password" id="admin-password" placeholder="パスワードを入力"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 pr-12 text-white placeholder-slate-500 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none transition">
              <button type="button" onclick="toggleAdminPassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition">
                <i id="admin-password-toggle-icon" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- ログインボタン -->
          <button type="submit"
            class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 px-6 rounded-xl transition-all hover:shadow-lg hover:shadow-amber-500/25">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>管理者ログイン
          </button>
        </form>

        <!-- ユーザーログインへ -->
        <div class="mt-6 text-center">
          <a href="../user/login.html" class="text-sm text-slate-500 hover:text-slate-300 transition">
            <i class="fa-solid fa-arrow-left mr-1"></i>ユーザーログインへ戻る
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="../shared/header.js"></script>
  <script>
    function toggleAdminPassword() {
      const input = document.getElementById('admin-password');
      const icon = document.getElementById('admin-password-toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    function handleAdminLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
