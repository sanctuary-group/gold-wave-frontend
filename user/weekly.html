<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今週の予測 - GOLD WAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark bg-pattern-subtle text-charcoal font-body min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- ページヘッダー -->
    <div class="mb-6">
      <div class="flex items-center justify-between">
        <h1 class="text-3xl sm:text-4xl font-heading font-semibold text-charcoal mb-2 tracking-tight">
          <i class="fa-solid fa-calendar-week text-gold-shine mr-2"></i>今週の予測一覧
        </h1>
        <span id="weekly-data-source-badge"></span>
      </div>
      <p class="text-warm-gray/80 text-sm" id="week-range"></p>
    </div>

    <!-- 日付タブ -->
    <div class="mb-4 overflow-x-auto pb-2">
      <div class="flex gap-2" id="date-tabs"></div>
    </div>

    <!-- レース場フィルター -->
    <div class="mb-6 overflow-x-auto pb-2">
      <div class="flex gap-2" id="stadium-filter"></div>
    </div>

    <!-- 集計サマリー（準備中） -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card-premium p-5 opacity-60">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-b from-gold/12 to-gold/4 flex items-center justify-center">
            <i class="fa-solid fa-bullseye text-gold/40 text-xl"></i>
          </div>
          <div>
            <p class="text-xs text-warm-gray/80">本日の的中</p>
            <p class="text-sm text-warm-gray">準備中</p>
          </div>
        </div>
      </div>
      <div class="card-premium p-5 opacity-60">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-b from-gold/12 to-gold/4 flex items-center justify-center">
            <i class="fa-solid fa-chart-pie text-gold/40 text-xl"></i>
          </div>
          <div>
            <p class="text-xs text-warm-gray/80">今週の的中</p>
            <p class="text-sm text-warm-gray">準備中</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 予測カード一覧 -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5" id="prediction-cards">
    </div>

    <!-- 空状態 -->
    <div id="empty-state" class="hidden text-center py-16">
      <i class="fa-solid fa-inbox text-4xl text-warm-gray/60 mb-4"></i>
      <p class="text-warm-gray">この日の予測はありません</p>
    </div>

  </main>

  <script src="../shared/dummy-data.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
  <script>
    let selectedDate = '2026-02-23';
    let selectedStadium = 'all';
    let apiEstimates = []; // APIから取得したestimates

    document.addEventListener('DOMContentLoaded', function () {
      initWeekRange();
      initDateTabs();
      initStadiumFilter();
      loadEstimatesForDate();
    });

    // APIからestimates取得
    async function loadEstimatesForDate() {
      try {
        const res = await fetchEstimatesByDate(selectedDate);
        apiEstimates = res.data || [];
        console.log('[API] estimates loaded:', selectedDate, apiEstimates.length, '件');
      } catch (e) {
        apiEstimates = [];
        console.warn('[API] estimates取得失敗（ダミーデータで表示）:', e.message);
      }
      selectedStadium = 'all';
      updateWeeklyDataSourceBadge();
      rebuildStadiumFilter();
      renderCards();
    }

    function updateWeeklyDataSourceBadge() {
      const badge = document.getElementById('weekly-data-source-badge');
      if (apiEstimates.length > 0) {
        badge.innerHTML = '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-status-success-bg text-status-success"><i class="fa-solid fa-satellite-dish mr-1"></i>API</span>';
      } else {
        badge.innerHTML = '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-status-warning-bg text-gold"><i class="fa-solid fa-flask mr-1"></i>DEMO</span>';
      }
    }

    function initWeekRange() {
      const dates = getWeekDates();
      document.getElementById('week-range').textContent =
        `${formatDate(dates[0])} ~ ${formatDate(dates[6])}`;
    }

    function initDateTabs() {
      const container = document.getElementById('date-tabs');
      const dates = getWeekDates();
      dates.forEach(date => {
        const btn = document.createElement('button');
        btn.textContent = formatDate(date);
        btn.dataset.date = date;
        btn.className = date === selectedDate
          ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-gold text-charcoal shadow-elevation-1 whitespace-nowrap transition-all duration-600'
          : 'px-4 py-2 rounded-lg text-sm font-medium text-warm-gray hover:bg-dark-surface whitespace-nowrap transition-all duration-400';
        btn.addEventListener('click', () => {
          selectedDate = date;
          document.querySelectorAll('#date-tabs button').forEach(b => {
            b.className = 'px-4 py-2 rounded-lg text-sm font-medium text-warm-gray hover:bg-dark-surface whitespace-nowrap transition-all duration-400';
          });
          btn.className = 'px-4 py-2 rounded-lg text-sm font-semibold bg-gold text-charcoal shadow-elevation-1 whitespace-nowrap transition-all duration-600';
          loadEstimatesForDate();
        });
        container.appendChild(btn);
      });
    }

    function initStadiumFilter() {
      rebuildStadiumFilter();
    }

    function rebuildStadiumFilter() {
      const container = document.getElementById('stadium-filter');
      container.innerHTML = '';

      // 全場ボタン
      const allBtn = document.createElement('button');
      allBtn.textContent = '全場';
      allBtn.dataset.stadium = 'all';
      allBtn.className = selectedStadium === 'all'
        ? 'px-3 py-1.5 rounded-lg text-xs font-semibold bg-gold text-charcoal shadow-elevation-1 whitespace-nowrap transition-all duration-600'
        : 'px-3 py-1.5 rounded-lg text-xs font-medium text-warm-gray hover:bg-dark-surface whitespace-nowrap transition-all duration-400';
      allBtn.addEventListener('click', () => selectStadiumFilter('all'));
      container.appendChild(allBtn);

      const stadiums = [...new Set(apiEstimates.map(e => parseInt(e.venueCode, 10)))].sort((a, b) => a - b);

      stadiums.forEach(num => {
        const btn = document.createElement('button');
        btn.textContent = STADIUMS[num];
        btn.dataset.stadium = num;
        btn.className = String(selectedStadium) === String(num)
          ? 'px-3 py-1.5 rounded-lg text-xs font-semibold bg-gold text-charcoal shadow-elevation-1 whitespace-nowrap transition-all duration-600'
          : 'px-3 py-1.5 rounded-lg text-xs font-medium text-warm-gray hover:bg-dark-surface whitespace-nowrap transition-all duration-400';
        btn.addEventListener('click', () => selectStadiumFilter(num));
        container.appendChild(btn);
      });
    }

    function selectStadiumFilter(stadium) {
      selectedStadium = stadium;
      rebuildStadiumFilter();
      renderCards();
    }

    function renderCards() {
      let items = apiEstimates.map(est => ({
        stadium: parseInt(est.venueCode, 10),
        race: est.raceNumber,
        prediction: est.predictedRanks,
        technique: est.predictedTechnique,
      }));

      if (selectedStadium !== 'all') {
        items = items.filter(w => w.stadium === Number(selectedStadium));
      }

      const container = document.getElementById('prediction-cards');
      const empty = document.getElementById('empty-state');

      if (items.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      container.innerHTML = items.map(item => {
        const stadiumName = STADIUMS[item.stadium];

        return `
          <div class="card-premium p-6">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-charcoal font-bold">${stadiumName}</span>
                <span class="text-gold font-mono text-sm">${item.race}R</span>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs text-warm-gray">予想:</span>
              ${renderPredictionOrder(item.prediction, 'sm')}
            </div>
            <div class="flex items-center gap-2 mt-3">
              <span class="text-xs text-warm-gray">決まり手:</span>
              <span class="text-sm font-medium text-gold-warm"><i class="fa-solid fa-bolt mr-1"></i>${item.technique}</span>
            </div>
            <div class="flex items-center gap-2 mt-3">
              <span class="text-xs text-warm-gray">結果:</span>
              <span class="text-warm-gray/60 text-sm">準備中</span>
            </div>
          </div>`;
      }).join('');
    }

  </script>
</body>
</html>
