<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - BOAT PREDICTOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1e293b' } } } }
    }
  </script>
</head>
<body class="bg-[#0a0e1a] text-slate-100 min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- ログインカード -->
      <div class="bg-gray-900 rounded-2xl shadow-2xl border border-slate-700/50 p-8">
        <!-- ロゴ -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-sky-500/10 border border-sky-500/30 mb-4">
            <i class="fa-solid fa-ship text-sky-500 text-2xl"></i>
          </div>
          <h1 class="text-2xl font-bold">
            <span class="text-sky-500">BOAT</span>
            <span class="text-white">PREDICTOR</span>
          </h1>
          <p class="text-slate-400 text-sm mt-1">アカウントにログイン</p>
        </div>

        <!-- フォーム -->
        <form onsubmit="handleLogin(event)" class="space-y-5">
          <!-- ユーザーID -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">
              <i class="fa-solid fa-user mr-1 text-slate-500"></i>ユーザーID
            </label>
            <input type="text" placeholder="ユーザーIDを入力"
              class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition">
          </div>

          <!-- パスワード -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">
              <i class="fa-solid fa-lock mr-1 text-slate-500"></i>パスワード
            </label>
            <div class="relative">
              <input type="password" id="password" placeholder="パスワードを入力"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 pr-12 text-white placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition">
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition">
                <i id="password-toggle-icon" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- ログイン維持 -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded border-slate-600 bg-slate-800 text-sky-500 focus:ring-sky-500 focus:ring-offset-0">
              <span class="text-sm text-slate-400">ログイン状態を維持</span>
            </label>
            <a href="#" class="text-sm text-sky-400 hover:text-sky-300 transition">パスワードを忘れた</a>
          </div>

          <!-- ログインボタン -->
          <button type="submit"
            class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 px-6 rounded-xl transition-all hover:shadow-lg hover:shadow-sky-500/25">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>ログイン
          </button>
        </form>

        <!-- 区切り -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-700"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-3 bg-gray-900 text-slate-500">アカウントをお持ちでない方</span>
          </div>
        </div>

        <!-- 新規登録リンク -->
        <a href="register.html"
          class="block w-full text-center border-2 border-slate-700 hover:border-sky-500/50 text-slate-300 hover:text-white font-medium py-3 px-6 rounded-xl transition-all">
          <i class="fa-solid fa-user-plus mr-2"></i>新規登録はこちら
        </a>
      </div>
    </div>
  </main>

  <script src="../shared/header.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('password-toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      // モック: 予測画面へ遷移
      window.location.href = 'predict.html';
    }
  </script>
</body>
</html>
