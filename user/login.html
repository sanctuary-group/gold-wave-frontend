<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - GOLD WAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark text-charcoal font-body min-h-screen flex flex-col bg-pattern-subtle">

  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- ログインカード -->
      <div class="card-premium p-10">
        <!-- ロゴ -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-b from-gold/12 to-gold/4 mb-5">
            <i class="fa-solid fa-ship text-gold-shine text-2xl"></i>
          </div>
          <h1 class="text-3xl tracking-tight font-bold">
            <span class="text-gold-gradient font-heading">BOAT</span>
            <span class="text-charcoal font-heading">PREDICTOR</span>
          </h1>
          <p class="text-warm-gray/80 text-sm mt-1">アカウントにログイン</p>
        </div>

        <!-- 準備中バナー -->
        <div class="flex items-center gap-2 mb-6 px-4 py-3 rounded-xl bg-status-purple-bg/50">
          <i class="fa-solid fa-circle-info text-status-purple text-sm"></i>
          <span class="text-sm text-status-purple">認証機能は準備中です。ログインボタンで予測画面に遷移します。</span>
        </div>

        <!-- フォーム -->
        <form onsubmit="handleLogin(event)" class="space-y-5">
          <!-- ユーザーID -->
          <div>
            <label class="block text-sm font-medium text-warm-text mb-2">
              <i class="fa-solid fa-user mr-1 text-warm-gray"></i>ユーザーID
            </label>
            <input type="text" placeholder="ユーザーIDを入力"
              class="input-premium">
          </div>

          <!-- パスワード -->
          <div>
            <label class="block text-sm font-medium text-warm-text mb-2">
              <i class="fa-solid fa-lock mr-1 text-warm-gray"></i>パスワード
            </label>
            <div class="relative">
              <input type="password" id="password" placeholder="パスワードを入力"
                class="input-premium pr-12">
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-warm-gray hover:text-charcoal transition">
                <i id="password-toggle-icon" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- ログイン維持 -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded border-gold/30 bg-dark-surface text-gold focus:ring-gold focus:ring-offset-0">
              <span class="text-sm text-warm-gray">ログイン状態を維持</span>
            </label>
            <a href="#" class="text-sm text-gold/70 hover:text-gold transition-all duration-400">パスワードを忘れた</a>
          </div>

          <!-- ログインボタン -->
          <button type="submit"
            class="w-full btn-primary">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>ログイン
          </button>
        </form>

        <!-- 区切り -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full divider-soft"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-3 bg-card text-warm-gray">アカウントをお持ちでない方</span>
          </div>
        </div>

        <!-- 新規登録リンク -->
        <a href="register.html"
          class="block w-full text-center btn-ghost text-sm py-3">
          <i class="fa-solid fa-user-plus mr-2"></i>新規登録はこちら
        </a>
      </div>
    </div>
  </main>

  <script src="../shared/header.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('password-toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      // モック: 予測画面へ遷移
      window.location.href = 'predict.html';
    }
  </script>
</body>
</html>
