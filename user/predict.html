<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予測 - BOAT PREDICTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark text-charcoal font-body min-h-screen flex flex-col bg-pattern-subtle">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- 条件選択エリア -->
    <section class="card-premium-static p-5 sm:p-7 mb-8">
      <h2 class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-4">
        <i class="fa-solid fa-sliders mr-1"></i>レース選択
      </h2>
      <div class="flex flex-wrap gap-3 items-end">
        <!-- 日付 -->
        <div>
          <label class="block text-xs text-warm-gray mb-1">日付</label>
          <input type="date" id="race-date" value="2026-02-23"
            class="input-premium text-sm">
        </div>
        <!-- レース場 -->
        <div>
          <label class="block text-xs text-warm-gray mb-1">レース場</label>
          <select id="race-stadium"
            class="input-premium text-sm min-w-[120px]">
          </select>
        </div>
        <!-- レース番号 -->
        <div class="flex-1 min-w-0">
          <label class="block text-xs text-warm-gray mb-1">レース</label>
          <div class="flex flex-wrap gap-1.5" id="race-tabs">
          </div>
        </div>
      </div>
    </section>

    <!-- 出走表 -->
    <section class="card-gold-accent mb-8 overflow-hidden">
      <div class="px-5 sm:px-7 py-5 flex flex-wrap items-center justify-between gap-2" style="border-bottom: 1px solid var(--border-gold-accent)">
        <div>
          <h2 class="text-xl font-heading font-semibold tracking-tight text-charcoal" id="race-title">1R 江戸川グランプリ</h2>
          <p class="text-sm text-warm-gray" id="race-subtitle">予選 | 1800m</p>
        </div>
        <span class="badge-premium bg-status-warning-bg text-gold">
          <i class="fa-solid fa-table-list mr-1"></i>出走表
        </span>
      </div>
      <div class="overflow-x-auto">
        <table class="table-premium min-w-[640px]">
          <thead>
            <tr>
              <th class="text-left">艇</th>
              <th class="text-left">選手名</th>
              <th class="text-center">級別</th>
              <th class="text-center">勝率</th>
              <th class="text-center">2連率</th>
              <th class="text-center">ST</th>
              <th class="text-center">モーター</th>
              <th class="text-center">ボート</th>
            </tr>
          </thead>
          <tbody id="race-table-body">
          </tbody>
        </table>
      </div>
    </section>

    <!-- ロジック選択 -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-4">
        <i class="fa-solid fa-brain mr-1"></i>予測ロジックを選択
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="logic-cards">
      </div>
    </section>

    <!-- 予測結果 -->
    <section id="prediction-result" class="hidden mb-8 transition-all duration-500">
      <div class="card-gold-accent p-5 sm:p-8">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
          <h2 class="text-lg font-bold text-charcoal">
            <i class="fa-solid fa-crosshairs text-gold-shine mr-2"></i>予測結果
          </h2>
          <div class="flex items-center gap-2">
            <span class="text-sm text-warm-gray">信頼度</span>
            <div class="w-32" id="confidence-bar"></div>
          </div>
        </div>

        <!-- 予想着順 -->
        <div class="bg-gradient-to-b from-dark-surface/80 to-dark-light/40 rounded-2xl p-6 sm:p-8 mb-6 text-center">
          <p class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-3">予想着順</p>
          <div class="flex items-center justify-center gap-2 text-2xl" id="prediction-order">
          </div>
        </div>

        <!-- 推奨買い目 -->
        <div class="mb-6">
          <h3 class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-3">
            <i class="fa-solid fa-coins mr-1"></i>推奨買い目
          </h3>
          <div class="rounded-xl overflow-hidden bg-dark-surface/50">
            <table class="table-premium">
              <thead>
                <tr>
                  <th class="text-left">券種</th>
                  <th class="text-center">組合せ</th>
                  <th class="text-right">オッズ</th>
                </tr>
              </thead>
              <tbody id="bets-table-body">
              </tbody>
            </table>
          </div>
        </div>

        <!-- 分析詳細 -->
        <div>
          <button onclick="toggleAnalysis()" class="flex items-center gap-2 text-xs font-semibold uppercase tracking-widest text-warm-gray/70 hover:text-charcoal transition-all duration-400 mb-3">
            <i class="fa-solid fa-chevron-down text-xs" id="analysis-toggle-icon"></i>分析詳細
          </button>
          <div id="analysis-detail" class="hidden bg-dark-surface/50 rounded-xl p-5">
            <p class="text-sm text-warm-text leading-relaxed" id="analysis-text"></p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="../shared/dummy-data.js"></script>
  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
  <script>
    let selectedRace = 1;
    let selectedLogic = null;

    // 初期化
    document.addEventListener('DOMContentLoaded', function () {
      initStadiumSelect();
      initRaceTabs();
      renderRaceTable();
      renderLogicCards();
    });

    // レース場セレクト初期化
    function initStadiumSelect() {
      const select = document.getElementById('race-stadium');
      Object.entries(STADIUMS).forEach(([num, name]) => {
        const opt = document.createElement('option');
        opt.value = num;
        opt.textContent = name;
        if (num === '3') opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => { renderRaceTable(); });
    }

    // レース番号タブ初期化
    function initRaceTabs() {
      const container = document.getElementById('race-tabs');
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.textContent = i + 'R';
        btn.className = i === 1
          ? 'px-3.5 py-2 rounded-lg text-sm font-semibold bg-gold text-charcoal shadow-elevation-1 transition-all duration-600 ease-premium'
          : 'px-3.5 py-2 rounded-lg text-sm font-medium text-warm-gray hover:bg-dark-surface hover:text-charcoal transition-all duration-400';
        btn.addEventListener('click', () => {
          selectedRace = i;
          document.querySelectorAll('#race-tabs button').forEach(b => {
            b.className = 'px-3.5 py-2 rounded-lg text-sm font-medium text-warm-gray hover:bg-dark-surface hover:text-charcoal transition-all duration-400';
          });
          btn.className = 'px-3.5 py-2 rounded-lg text-sm font-semibold bg-gold text-charcoal shadow-elevation-1 transition-all duration-600 ease-premium';
          renderRaceTable();
          if (selectedLogic) showPrediction(selectedLogic);
        });
        container.appendChild(btn);
      }
    }

    // 出走表描画
    function renderRaceTable() {
      const program = DUMMY_PROGRAMS.find(p => p.race_number === selectedRace) || DUMMY_PROGRAMS[0];
      const stadiumName = STADIUMS[program.race_stadium_number] || '江戸川';

      document.getElementById('race-title').textContent = `${selectedRace}R ${stadiumName} ${program.race_title}`;
      document.getElementById('race-subtitle').textContent = `${program.race_subtitle} | ${program.race_distance}m`;

      const tbody = document.getElementById('race-table-body');
      tbody.innerHTML = program.boats.map(boat => `
        <tr class="transition-all duration-400">
          <td class="px-4 py-3">${getBoatBadge(boat.racer_boat_number)}</td>
          <td class="px-4 py-3">
            <div>
              <p class="text-charcoal font-medium">${boat.racer_name}</p>
              <p class="text-xs text-warm-gray">${boat.racer_number} / ${boat.racer_age}歳 / ${boat.racer_weight}kg</p>
            </div>
          </td>
          <td class="px-4 py-3 text-center">
            <span class="${getClassStyle(boat.racer_class_number)}">${RACER_CLASSES[boat.racer_class_number]}</span>
          </td>
          <td class="px-4 py-3 text-center font-mono ${boat.racer_national_top_1_percent >= 6.0 ? 'text-gold-warm font-bold' : 'text-charcoal'}">${boat.racer_national_top_1_percent.toFixed(2)}</td>
          <td class="px-4 py-3 text-center font-mono text-charcoal">${boat.racer_national_top_2_percent.toFixed(1)}%</td>
          <td class="px-4 py-3 text-center font-mono ${boat.racer_average_start_timing <= 0.15 ? 'text-status-success font-bold' : 'text-charcoal'}">${boat.racer_average_start_timing.toFixed(2)}</td>
          <td class="px-4 py-3 text-center">
            <span class="font-mono text-charcoal">${boat.racer_assigned_motor_number}</span>
            <span class="text-xs ${boat.racer_assigned_motor_top_2_percent >= 45 ? 'text-gold-warm' : 'text-warm-gray'} ml-1">${boat.racer_assigned_motor_top_2_percent.toFixed(1)}%</span>
          </td>
          <td class="px-4 py-3 text-center">
            <span class="font-mono text-charcoal">${boat.racer_assigned_boat_number}</span>
            <span class="text-xs text-warm-gray ml-1">${boat.racer_assigned_boat_top_2_percent.toFixed(1)}%</span>
          </td>
        </tr>
      `).join('');
    }

    // ロジックカード描画
    function renderLogicCards() {
      const container = document.getElementById('logic-cards');
      container.innerHTML = DUMMY_LOGICS.map(logic => `
        <div class="card-premium p-6 cursor-pointer group"
          data-logic="${logic.id}" onclick="selectLogic('${logic.id}', this)">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-lg font-bold text-charcoal">${logic.name}</h3>
            <span class="px-2 py-0.5 rounded text-xs font-medium ${logic.status === '有効' ? 'bg-status-success-bg text-status-success' : 'bg-status-purple-bg text-status-purple'}">${logic.status}</span>
          </div>
          <p class="text-sm text-warm-gray mb-3">${logic.description}</p>
          <div class="flex items-center justify-between">
            <span class="text-xs text-warm-gray">的中率</span>
            <span class="text-gold-warm font-mono font-bold">${logic.accuracy}%</span>
          </div>
          <div class="mt-2 bg-dark-surface rounded-full h-1.5">
            <div class="bg-gold h-1.5 rounded-full" style="width: ${logic.accuracy}%"></div>
          </div>
        </div>
      `).join('');
    }

    // ロジック選択
    function selectLogic(logicId, el) {
      selectedLogic = logicId;
      document.querySelectorAll('#logic-cards > div').forEach(card => {
        card.className = 'card-premium p-6 cursor-pointer group';
      });
      el.className = 'card-premium p-6 cursor-pointer group !shadow-gold-glow ring-1 ring-gold/20';
      showPrediction(logicId);
    }

    // 予測結果表示
    function showPrediction(logicId) {
      const pred = DUMMY_PREDICTIONS[logicId];
      if (!pred) return;

      const result = document.getElementById('prediction-result');
      result.classList.remove('hidden');

      // 信頼度バー
      document.getElementById('confidence-bar').innerHTML = getConfidenceBar(pred.confidence);

      // 予想着順
      document.getElementById('prediction-order').innerHTML = renderPredictionOrder(pred.top3, 'lg');

      // 買い目テーブル
      document.getElementById('bets-table-body').innerHTML = pred.bets.map(bet => `
        <tr class="transition-all duration-400">
          <td class="px-4 py-3 text-charcoal font-medium">${bet.type}</td>
          <td class="px-4 py-3 text-center font-mono text-charcoal">${bet.combination}</td>
          <td class="px-4 py-3 text-right font-mono font-bold text-gold-warm">${bet.odds.toFixed(1)}</td>
        </tr>
      `).join('');

      // 分析テキスト
      document.getElementById('analysis-text').textContent = pred.analysis;
      document.getElementById('analysis-detail').classList.add('hidden');
      document.getElementById('analysis-toggle-icon').className = 'fa-solid fa-chevron-down text-xs';
    }

    // 分析詳細トグル
    function toggleAnalysis() {
      const detail = document.getElementById('analysis-detail');
      const icon = document.getElementById('analysis-toggle-icon');
      detail.classList.toggle('hidden');
      icon.className = detail.classList.contains('hidden')
        ? 'fa-solid fa-chevron-down text-xs'
        : 'fa-solid fa-chevron-up text-xs';
    }
  </script>
</body>
</html>
