<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予測 - BOAT PREDICTOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1e293b' } } } }
    }
  </script>
</head>
<body class="bg-[#0a0e1a] text-slate-100 min-h-screen flex flex-col">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- 条件選択エリア -->
    <section class="bg-gray-900 rounded-xl border border-slate-700/50 p-4 sm:p-6 mb-6">
      <h2 class="text-sm font-medium text-slate-400 mb-4">
        <i class="fa-solid fa-sliders mr-1"></i>レース選択
      </h2>
      <div class="flex flex-wrap gap-3 items-end">
        <!-- 日付 -->
        <div>
          <label class="block text-xs text-slate-500 mb-1">日付</label>
          <input type="date" id="race-date" value="2026-02-23"
            class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition">
        </div>
        <!-- レース場 -->
        <div>
          <label class="block text-xs text-slate-500 mb-1">レース場</label>
          <select id="race-stadium"
            class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:outline-none transition min-w-[120px]">
          </select>
        </div>
        <!-- レース番号 -->
        <div class="flex-1 min-w-0">
          <label class="block text-xs text-slate-500 mb-1">レース</label>
          <div class="flex flex-wrap gap-1.5" id="race-tabs">
          </div>
        </div>
      </div>
    </section>

    <!-- 出走表 -->
    <section class="bg-gray-900 rounded-xl border border-slate-700/50 mb-6 overflow-hidden">
      <div class="px-4 sm:px-6 py-4 border-b border-slate-700/50 flex flex-wrap items-center justify-between gap-2">
        <div>
          <h2 class="text-lg font-bold text-white" id="race-title">1R 江戸川グランプリ</h2>
          <p class="text-sm text-slate-400" id="race-subtitle">予選 | 1800m</p>
        </div>
        <span class="px-2.5 py-1 rounded-lg bg-sky-500/10 text-sky-400 text-xs font-medium">
          <i class="fa-solid fa-table-list mr-1"></i>出走表
        </span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full min-w-[640px]">
          <thead>
            <tr class="bg-slate-800/50">
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">艇</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">選手名</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">級別</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">勝率</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">2連率</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">ST</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">モーター</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">ボート</th>
            </tr>
          </thead>
          <tbody id="race-table-body">
          </tbody>
        </table>
      </div>
    </section>

    <!-- ロジック選択 -->
    <section class="mb-6">
      <h2 class="text-sm font-medium text-slate-400 mb-4">
        <i class="fa-solid fa-brain mr-1"></i>予測ロジックを選択
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="logic-cards">
      </div>
    </section>

    <!-- 予測結果 -->
    <section id="prediction-result" class="hidden mb-6 transition-all duration-500">
      <div class="bg-gray-900 rounded-xl border border-sky-500/30 p-4 sm:p-6">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
          <h2 class="text-lg font-bold text-white">
            <i class="fa-solid fa-crosshairs text-sky-500 mr-2"></i>予測結果
          </h2>
          <div class="flex items-center gap-2">
            <span class="text-sm text-slate-400">信頼度</span>
            <div class="w-32" id="confidence-bar"></div>
          </div>
        </div>

        <!-- 予想着順 -->
        <div class="bg-slate-800/50 rounded-xl p-4 sm:p-6 mb-6 text-center">
          <p class="text-sm text-slate-400 mb-3">予想着順</p>
          <div class="flex items-center justify-center gap-2 text-2xl" id="prediction-order">
          </div>
        </div>

        <!-- 推奨買い目 -->
        <div class="mb-6">
          <h3 class="text-sm font-medium text-slate-400 mb-3">
            <i class="fa-solid fa-coins mr-1"></i>推奨買い目
          </h3>
          <div class="bg-slate-800/50 rounded-lg overflow-hidden">
            <table class="w-full">
              <thead>
                <tr class="border-b border-slate-700">
                  <th class="px-4 py-2.5 text-left text-xs font-medium text-slate-400">券種</th>
                  <th class="px-4 py-2.5 text-center text-xs font-medium text-slate-400">組合せ</th>
                  <th class="px-4 py-2.5 text-right text-xs font-medium text-slate-400">オッズ</th>
                </tr>
              </thead>
              <tbody id="bets-table-body">
              </tbody>
            </table>
          </div>
        </div>

        <!-- 分析詳細 -->
        <div>
          <button onclick="toggleAnalysis()" class="flex items-center gap-2 text-sm text-slate-400 hover:text-slate-300 transition mb-3">
            <i class="fa-solid fa-chevron-down text-xs" id="analysis-toggle-icon"></i>分析詳細
          </button>
          <div id="analysis-detail" class="hidden bg-slate-800/50 rounded-lg p-4">
            <p class="text-sm text-slate-300 leading-relaxed" id="analysis-text"></p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="../shared/dummy-data.js"></script>
  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
  <script>
    let selectedRace = 1;
    let selectedLogic = null;

    // 初期化
    document.addEventListener('DOMContentLoaded', function () {
      initStadiumSelect();
      initRaceTabs();
      renderRaceTable();
      renderLogicCards();
    });

    // レース場セレクト初期化
    function initStadiumSelect() {
      const select = document.getElementById('race-stadium');
      Object.entries(STADIUMS).forEach(([num, name]) => {
        const opt = document.createElement('option');
        opt.value = num;
        opt.textContent = name;
        if (num === '3') opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => { renderRaceTable(); });
    }

    // レース番号タブ初期化
    function initRaceTabs() {
      const container = document.getElementById('race-tabs');
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.textContent = i + 'R';
        btn.className = i === 1
          ? 'px-3 py-1.5 rounded-lg text-sm font-medium bg-sky-500 text-white transition'
          : 'px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-300 transition';
        btn.addEventListener('click', () => {
          selectedRace = i;
          document.querySelectorAll('#race-tabs button').forEach(b => {
            b.className = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-300 transition';
          });
          btn.className = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-sky-500 text-white transition';
          renderRaceTable();
          if (selectedLogic) showPrediction(selectedLogic);
        });
        container.appendChild(btn);
      }
    }

    // 出走表描画
    function renderRaceTable() {
      const program = DUMMY_PROGRAMS.find(p => p.race_number === selectedRace) || DUMMY_PROGRAMS[0];
      const stadiumName = STADIUMS[program.race_stadium_number] || '江戸川';

      document.getElementById('race-title').textContent = `${selectedRace}R ${stadiumName} ${program.race_title}`;
      document.getElementById('race-subtitle').textContent = `${program.race_subtitle} | ${program.race_distance}m`;

      const tbody = document.getElementById('race-table-body');
      tbody.innerHTML = program.boats.map(boat => `
        <tr class="border-b border-slate-700/50 hover:bg-slate-800/30 transition">
          <td class="px-4 py-3">${getBoatBadge(boat.racer_boat_number)}</td>
          <td class="px-4 py-3">
            <div>
              <p class="text-white font-medium">${boat.racer_name}</p>
              <p class="text-xs text-slate-500">${boat.racer_number} / ${boat.racer_age}歳 / ${boat.racer_weight}kg</p>
            </div>
          </td>
          <td class="px-4 py-3 text-center">
            <span class="${getClassStyle(boat.racer_class_number)}">${RACER_CLASSES[boat.racer_class_number]}</span>
          </td>
          <td class="px-4 py-3 text-center font-mono ${boat.racer_national_top_1_percent >= 6.0 ? 'text-amber-400 font-bold' : 'text-white'}">${boat.racer_national_top_1_percent.toFixed(2)}</td>
          <td class="px-4 py-3 text-center font-mono text-white">${boat.racer_national_top_2_percent.toFixed(1)}%</td>
          <td class="px-4 py-3 text-center font-mono ${boat.racer_average_start_timing <= 0.15 ? 'text-green-400 font-bold' : 'text-white'}">${boat.racer_average_start_timing.toFixed(2)}</td>
          <td class="px-4 py-3 text-center">
            <span class="font-mono text-white">${boat.racer_assigned_motor_number}</span>
            <span class="text-xs ${boat.racer_assigned_motor_top_2_percent >= 45 ? 'text-amber-400' : 'text-slate-400'} ml-1">${boat.racer_assigned_motor_top_2_percent.toFixed(1)}%</span>
          </td>
          <td class="px-4 py-3 text-center">
            <span class="font-mono text-white">${boat.racer_assigned_boat_number}</span>
            <span class="text-xs text-slate-400 ml-1">${boat.racer_assigned_boat_top_2_percent.toFixed(1)}%</span>
          </td>
        </tr>
      `).join('');
    }

    // ロジックカード描画
    function renderLogicCards() {
      const container = document.getElementById('logic-cards');
      container.innerHTML = DUMMY_LOGICS.map(logic => `
        <div class="bg-gray-900 border-2 border-slate-700 rounded-xl p-5 cursor-pointer transition hover:border-slate-500 group"
          data-logic="${logic.id}" onclick="selectLogic('${logic.id}', this)">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-lg font-bold text-white">${logic.name}</h3>
            <span class="px-2 py-0.5 rounded text-xs font-medium ${logic.status === '有効' ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'}">${logic.status}</span>
          </div>
          <p class="text-sm text-slate-400 mb-3">${logic.description}</p>
          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-500">的中率</span>
            <span class="text-amber-400 font-mono font-bold">${logic.accuracy}%</span>
          </div>
          <div class="mt-2 bg-slate-700 rounded-full h-1.5">
            <div class="bg-amber-400 h-1.5 rounded-full" style="width: ${logic.accuracy}%"></div>
          </div>
        </div>
      `).join('');
    }

    // ロジック選択
    function selectLogic(logicId, el) {
      selectedLogic = logicId;
      document.querySelectorAll('#logic-cards > div').forEach(card => {
        card.className = 'bg-gray-900 border-2 border-slate-700 rounded-xl p-5 cursor-pointer transition hover:border-slate-500 group';
      });
      el.className = 'bg-gray-900 border-2 border-sky-500 rounded-xl p-5 cursor-pointer transition ring-2 ring-sky-500/30 group';
      showPrediction(logicId);
    }

    // 予測結果表示
    function showPrediction(logicId) {
      const pred = DUMMY_PREDICTIONS[logicId];
      if (!pred) return;

      const result = document.getElementById('prediction-result');
      result.classList.remove('hidden');

      // 信頼度バー
      document.getElementById('confidence-bar').innerHTML = getConfidenceBar(pred.confidence);

      // 予想着順
      document.getElementById('prediction-order').innerHTML = renderPredictionOrder(pred.top3, 'lg');

      // 買い目テーブル
      document.getElementById('bets-table-body').innerHTML = pred.bets.map(bet => `
        <tr class="border-b border-slate-700/50">
          <td class="px-4 py-3 text-white font-medium">${bet.type}</td>
          <td class="px-4 py-3 text-center font-mono text-white">${bet.combination}</td>
          <td class="px-4 py-3 text-right font-mono font-bold text-amber-400">${bet.odds.toFixed(1)}</td>
        </tr>
      `).join('');

      // 分析テキスト
      document.getElementById('analysis-text').textContent = pred.analysis;
      document.getElementById('analysis-detail').classList.add('hidden');
      document.getElementById('analysis-toggle-icon').className = 'fa-solid fa-chevron-down text-xs';
    }

    // 分析詳細トグル
    function toggleAnalysis() {
      const detail = document.getElementById('analysis-detail');
      const icon = document.getElementById('analysis-toggle-icon');
      detail.classList.toggle('hidden');
      icon.className = detail.classList.contains('hidden')
        ? 'fa-solid fa-chevron-down text-xs'
        : 'fa-solid fa-chevron-up text-xs';
    }
  </script>
</body>
</html>
