<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予測 - GOLD WAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="../shared/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-dark text-charcoal font-body min-h-screen flex flex-col bg-pattern-subtle">

  <div id="app-header"></div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">

    <!-- 条件選択エリア -->
    <section class="card-premium-static p-5 sm:p-7 mb-8">
      <h2 class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-3">
        <i class="fa-solid fa-sliders mr-1"></i>レース選択
      </h2>
      <div class="flex items-center gap-2 mb-4 px-3 py-2.5 rounded-lg bg-dark-surface/50">
        <i class="fa-solid fa-robot text-gold/40 text-sm"></i>
        <span class="text-sm text-warm-gray/60">AIコメント・推奨レース機能は準備中です</span>
        <span class="px-2 py-0.5 rounded text-xs font-medium bg-status-purple-bg text-status-purple ml-auto">準備中</span>
      </div>
      <div class="grid grid-cols-2 sm:flex sm:flex-wrap gap-2 sm:gap-3 items-end">
        <!-- 日付 -->
        <div>
          <label class="block text-xs text-warm-gray mb-1">日付</label>
          <input type="date" id="race-date" value="2026-02-23"
            class="input-premium text-sm w-full">
        </div>
        <!-- レース場 -->
        <div>
          <label class="block text-xs text-warm-gray mb-1">レース場</label>
          <select id="race-stadium"
            class="input-premium text-sm w-full sm:min-w-[120px]">
          </select>
        </div>
        <!-- レース番号 -->
        <div class="col-span-2 sm:flex-1 sm:min-w-0">
          <label class="block text-xs text-warm-gray mb-1">レース</label>
          <div class="flex gap-1.5 overflow-x-auto pb-1 -mx-1 px-1 scrollbar-hide" id="race-tabs">
          </div>
        </div>
      </div>
    </section>

    <!-- ロジック予測カルーセル -->
    <section class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80">
          <i class="fa-solid fa-brain mr-1"></i>予測ロジック
        </h2>
        <span id="data-source-badge"></span>
      </div>
      <div class="relative px-5 sm:px-8">
        <!-- 左矢印 -->
        <button onclick="prevSlide()" class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-3 sm:-translate-x-5 z-10 w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-dark-card text-gold hover:text-cream hover:bg-dark-surface shadow-elevation-2 transition-all duration-400 flex items-center justify-center">
          <i class="fa-solid fa-chevron-left text-lg"></i>
        </button>
        <!-- 右矢印 -->
        <button onclick="nextSlide()" class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-3 sm:translate-x-5 z-10 w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-dark-card text-gold hover:text-cream hover:bg-dark-surface shadow-elevation-2 transition-all duration-400 flex items-center justify-center">
          <i class="fa-solid fa-chevron-right text-lg"></i>
        </button>
        <!-- カルーセル本体 -->
        <div class="overflow-hidden rounded-2xl relative" id="carousel-viewport" style="touch-action: pan-y;">
          <div class="flex transition-transform duration-300 ease-out will-change-transform" id="carousel-track">
          </div>
          <!-- スワイプヒント -->
          <div id="swipe-hint" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm rounded-2xl cursor-pointer transition-opacity duration-500" style="display:none;">
            <div class="flex items-center gap-4 mb-3">
              <i class="fa-solid fa-arrow-left text-white/80 text-xl animate-pulse-soft"></i>
              <div class="w-14 h-14 rounded-full border-2 border-white/60 flex items-center justify-center">
                <i class="fa-solid fa-hand-pointer text-white text-2xl"></i>
              </div>
              <i class="fa-solid fa-arrow-right text-white/80 text-xl animate-pulse-soft"></i>
            </div>
            <p class="text-white/90 text-sm font-medium tracking-wide">スワイプで切替</p>
          </div>
        </div>
        <!-- 下部コントロール -->
        <div class="flex items-center justify-center mt-4">
          <div class="flex gap-2" id="carousel-dots"></div>
        </div>
      </div>
    </section>

    <!-- 出走表 -->
    <section class="card-gold-accent mb-8 overflow-hidden">
      <div class="px-5 sm:px-7 py-5 flex flex-wrap items-center justify-between gap-2">
        <div class="flex items-center gap-3">
          <h2 class="text-xl font-heading font-semibold tracking-tight text-charcoal">
            <i class="fa-solid fa-table-list mr-2 text-gold/40"></i>出走表
          </h2>
          <span class="px-2 py-0.5 rounded text-xs font-medium bg-status-purple-bg text-status-purple">準備中</span>
        </div>
      </div>
      <div class="px-5 sm:px-7 py-12 flex flex-col items-center justify-center text-center">
        <div class="w-16 h-16 rounded-full bg-dark-surface/80 flex items-center justify-center mb-4">
          <i class="fa-solid fa-users text-gold/40 text-2xl"></i>
        </div>
        <h4 class="text-base font-semibold text-charcoal mb-2">出走表は準備中です</h4>
        <p class="text-sm text-warm-gray max-w-xs">選手情報・モーター成績等の表示は今後のアップデートで対応予定です。</p>
      </div>
    </section>

  </main>

  <script src="../shared/dummy-data.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/common.js"></script>
  <script src="../shared/header.js"></script>
  <script>
    let selectedRace = 1;
    let currentSlide = 0;
    let virtualIndex = 1;
    let trackEl, dotsEls;
    let currentEstimate = null; // APIから取得したestimateデータ


    // APIからestimateを取得して描画を更新
    async function loadEstimate() {
      const date = document.getElementById('race-date').value;
      const stadium = document.getElementById('race-stadium').value;
      try {
        const raceCode = buildRaceCode(date, stadium, selectedRace);
        const estimate = await fetchEstimate(raceCode);
        currentEstimate = estimate;
        console.log('[API] estimate loaded:', raceCode, estimate);
      } catch (e) {
        currentEstimate = null;
        console.warn('[API] estimate取得失敗（ダミーデータで表示）:', e.message);
      }
      updateDataSourceBadge();
      initCarousel();
    }

    function updateDataSourceBadge() {
      const badge = document.getElementById('data-source-badge');
      if (currentEstimate) {
        badge.innerHTML = '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-status-success-bg text-status-success"><i class="fa-solid fa-satellite-dish mr-1"></i>API</span>';
      } else {
        badge.innerHTML = '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-status-warning-bg text-gold"><i class="fa-solid fa-flask mr-1"></i>DEMO</span>';
      }
    }

    // 初期化
    document.addEventListener('DOMContentLoaded', function () {
      initStadiumSelect();
      initRaceTabs();
      loadEstimate();
      initSwipe();
      initSwipeHint();
    });

    // 日付変更時にAPI再取得
    document.getElementById('race-date').addEventListener('change', () => loadEstimate());

    // レース場セレクト初期化
    function initStadiumSelect() {
      const select = document.getElementById('race-stadium');
      Object.entries(STADIUMS).forEach(([num, name]) => {
        const opt = document.createElement('option');
        opt.value = num;
        opt.textContent = name;
        if (num === '3') opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => loadEstimate());
    }

    // レース番号タブ初期化
    function initRaceTabs() {
      const container = document.getElementById('race-tabs');
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.textContent = i + 'R';
        btn.className = i === 1
          ? 'px-3 py-2.5 rounded-lg text-xs font-semibold bg-gold text-charcoal shadow-elevation-1 transition-all duration-600 ease-premium flex-shrink-0'
          : 'px-3 py-2.5 rounded-lg text-xs font-medium text-warm-gray hover:bg-dark-surface hover:text-charcoal transition-all duration-400 flex-shrink-0';
        btn.addEventListener('click', () => {
          selectedRace = i;
          document.querySelectorAll('#race-tabs button').forEach(b => {
            b.className = 'px-3 py-2.5 rounded-lg text-xs font-medium text-warm-gray hover:bg-dark-surface hover:text-charcoal transition-all duration-400 flex-shrink-0';
          });
          btn.className = 'px-3 py-2.5 rounded-lg text-xs font-semibold bg-gold text-charcoal shadow-elevation-1 transition-all duration-600 ease-premium flex-shrink-0';
          loadEstimate();
        });
        container.appendChild(btn);
      }
    }

    // カルーセル初期化
    function buildSlideHTML(logic, i, isClone) {
      // ロジックB, C は「準備中」カードを表示
      if (logic.id !== 'A') {
        return `
          <div class="w-full flex-shrink-0">
            <div class="card-gold-accent overflow-hidden">
              <div class="px-5 sm:px-7 py-5" style="border-bottom: 1px solid var(--border-gold-accent)">
                <div class="flex items-center justify-between mb-2">
                  <h3 class="text-lg font-bold text-charcoal">${logic.name}<span class="text-sm font-normal text-warm-gray ml-2">${DUMMY_PREDICTIONS[logic.id].logic_subtitle}</span></h3>
                  <span class="px-2 py-0.5 rounded text-xs font-medium bg-status-purple-bg text-status-purple">準備中</span>
                </div>
                <p class="text-sm text-warm-gray">${logic.description}</p>
              </div>
              <div class="px-5 sm:px-7 py-16 flex flex-col items-center justify-center text-center">
                <div class="w-20 h-20 rounded-full bg-dark-surface/80 flex items-center justify-center mb-5">
                  <i class="fa-solid fa-flask text-gold/40 text-3xl"></i>
                </div>
                <h4 class="text-lg font-semibold text-charcoal mb-2">Coming Soon</h4>
                <p class="text-sm text-warm-gray max-w-xs">独自予測モデルを構築中です。次期アップデートで提供予定です。</p>
              </div>
            </div>
          </div>
        `;
      }

      // ロジックA: APIデータがなければ準備中
      if (!currentEstimate) {
        return `
          <div class="w-full flex-shrink-0">
            <div class="card-gold-accent overflow-hidden">
              <div class="px-5 sm:px-7 py-5" style="border-bottom: 1px solid var(--border-gold-accent)">
                <div class="flex items-center justify-between mb-2">
                  <h3 class="text-lg font-bold text-charcoal">${logic.name}<span class="text-sm font-normal text-warm-gray ml-2">${DUMMY_PREDICTIONS[logic.id].logic_subtitle}</span></h3>
                  <span class="px-2 py-0.5 rounded text-xs font-medium bg-status-warning-bg text-gold">データなし</span>
                </div>
                <p class="text-sm text-warm-gray">${logic.description}</p>
              </div>
              <div class="px-5 sm:px-7 py-16 flex flex-col items-center justify-center text-center">
                <div class="w-20 h-20 rounded-full bg-dark-surface/80 flex items-center justify-center mb-5">
                  <i class="fa-solid fa-calendar-xmark text-gold/40 text-3xl"></i>
                </div>
                <h4 class="text-lg font-semibold text-charcoal mb-2">予測データなし</h4>
                <p class="text-sm text-warm-gray max-w-xs">この日付・レース場の予測データがありません。開催日・会場を変更してください。</p>
              </div>
            </div>
          </div>
        `;
      }

      return `
          <div class="w-full flex-shrink-0">
            <div class="card-gold-accent overflow-hidden">
              <!-- ロジック概要 -->
              <div class="px-5 sm:px-7 py-5" style="border-bottom: 1px solid var(--border-gold-accent)">
                <div class="flex items-center justify-between mb-2">
                  <h3 class="text-lg font-bold text-charcoal">${logic.name}<span class="text-sm font-normal text-warm-gray ml-2">${DUMMY_PREDICTIONS[logic.id].logic_subtitle}</span></h3>
                  <span class="px-2 py-0.5 rounded text-xs font-medium bg-status-success-bg text-status-success">有効</span>
                </div>
                <p class="text-sm text-warm-gray mb-3">${logic.description}</p>
              </div>

              <!-- 予測結果 -->
              <div class="px-5 sm:px-7 py-5" style="border-top: 1px solid var(--border-gold-accent)">
                <div class="prediction-order-box mb-5">
                  <div class="prediction-sparkles"></div>
                  <p class="text-xs font-semibold uppercase tracking-widest text-warm-gray/80 mb-3" style="position:relative;z-index:1"><i class="fa-solid fa-trophy text-gold-shine mr-1.5"></i>予想着順</p>
                  <div class="flex items-center justify-center gap-3 text-xl" style="position:relative;z-index:1">
                    ${renderPredictionOrder(currentEstimate.predictedRanks, 'lg')}
                  </div>
                  <p class="text-center text-sm text-gold-warm mt-3" style="position:relative;z-index:1"><i class="fa-solid fa-bolt mr-1"></i>決まり手: ${currentEstimate.predictedTechnique}</p>
                </div>
              </div>
            </div>
          </div>
        `;
    }

    function initCarousel() {
      trackEl = document.getElementById('carousel-track');
      // 再初期化時は既存のcanvasアニメーションを停止
      trackEl.querySelectorAll('.prediction-sparkles').forEach(c => c._stopSparkles?.());

      const dotsContainer = document.getElementById('carousel-dots');
      const total = DUMMY_LOGICS.length;

      // 実スライドHTML
      const realSlides = DUMMY_LOGICS.map((logic, i) => buildSlideHTML(logic, i, false)).join('');
      // クローン: 末尾（C）を先頭に、先頭（A）を末尾に追加してループを実現
      const firstClone = buildSlideHTML(DUMMY_LOGICS[0], 0, true);
      const lastClone = buildSlideHTML(DUMMY_LOGICS[total - 1], total - 1, true);
      trackEl.innerHTML = lastClone + realSlides + firstClone;

      // virtualIndex=1 が実スライドの先頭（A）
      currentSlide = 0;
      virtualIndex = 1;

      dotsContainer.innerHTML = DUMMY_LOGICS.map((_, i) =>
        `<button onclick="goToSlide(${i})" class="w-3 h-3 rounded-full bg-gold/30 transition-all duration-400" data-dot="${i}"></button>`
      ).join('');
      dotsEls = dotsContainer.querySelectorAll('button');

      // canvasを生成してからupdateCarouselで表示スライドのみ開始
      initPredictionSparkles();
      updateCarousel();
    }

    function doWrapTransition(newIdx) {
      setTimeout(() => {
        trackEl.style.transition = 'none';
        virtualIndex = newIdx;
        updateCarousel();
        requestAnimationFrame(() => { trackEl.style.transition = ''; });
      }, 310);
    }

    function goToSlide(index) {
      currentSlide = index;
      virtualIndex = index + 1;
      updateCarousel();
    }
    function prevSlide() {
      if (virtualIndex < 1) return;
      currentSlide = (currentSlide - 1 + DUMMY_LOGICS.length) % DUMMY_LOGICS.length;
      virtualIndex--;
      updateCarousel();
      if (virtualIndex <= 0) doWrapTransition(DUMMY_LOGICS.length);
    }
    function nextSlide() {
      if (virtualIndex > DUMMY_LOGICS.length) return;
      currentSlide = (currentSlide + 1) % DUMMY_LOGICS.length;
      virtualIndex++;
      updateCarousel();
      if (virtualIndex >= DUMMY_LOGICS.length + 1) doWrapTransition(1);
    }

    function updateCarousel() {
      trackEl.style.transform = `translateX(-${virtualIndex * 100}%)`;
      dotsEls.forEach((dot, i) => {
        dot.className = i === currentSlide
          ? 'w-3.5 h-3.5 rounded-full bg-gold shadow-[0_0_6px_rgba(176,154,92,0.5)] transition-all duration-400'
          : 'w-3 h-3 rounded-full bg-gold/30 transition-all duration-400';
      });
      // 表示中スライドのcanvasのみ描画ループを動かす（他は停止してGPU負荷を削減）
      Array.from(trackEl.children).forEach((slide, i) => {
        const isActive = i === virtualIndex;
        slide.classList.toggle('active-slide', isActive);
        const sparkles = slide.querySelector('.prediction-sparkles');
        if (isActive) sparkles?._startSparkles?.();
        else sparkles?._stopSparkles?.();
      });
    }

    // スワイプ対応（方向検出+ドラッグ追従）
    function initSwipe() {
      const viewport = document.getElementById('carousel-viewport');
      let vpWidth = viewport.offsetWidth;
      window.addEventListener('resize', () => { vpWidth = viewport.offsetWidth; });
      let startX = 0, startY = 0, startTime = 0, deltaX = 0;
      let dragging = false, dirLocked = false, isHorizontal = false;
      let rafId = null;

      // ドラッグ中はボケ玉アニメーションを一時停止してGPU負荷を軽減
      const bokehEls = document.querySelectorAll('.header-sparkle, .header-sparkle-lg, .header-sparkle-bright');
      function pauseBokeh() {
        trackEl.querySelector('.active-slide .prediction-sparkles')?._stopSparkles?.();
        bokehEls.forEach(el => { el.style.animationPlayState = 'paused'; });
      }
      function resumeBokeh() {
        trackEl.querySelector('.active-slide .prediction-sparkles')?._startSparkles?.();
        bokehEls.forEach(el => { el.style.animationPlayState = ''; });
      }

      function endDrag() {
        dragging = false;
        dirLocked = false;
        isHorizontal = false;
        trackEl.style.transition = '';
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        deltaX = 0;
        resumeBokeh();
      }

      viewport.addEventListener('touchstart', function(e) {
        if (virtualIndex < 1 || virtualIndex > DUMMY_LOGICS.length) return;
        trackEl.style.transition = 'none';
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startTime = Date.now();
        deltaX = 0;
        dragging = false;
        dirLocked = false;
        isHorizontal = false;
      }, { passive: true });

      viewport.addEventListener('touchmove', function(e) {
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        // 最初の5px移動で方向を判定
        if (!dirLocked && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          dirLocked = true;
          isHorizontal = Math.abs(dx) > Math.abs(dy);
          if (isHorizontal) {
            dragging = true;
            trackEl.style.transition = 'none';
            pauseBokeh();
          }
        }
        if (!dragging) return;
        deltaX = dx;
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          trackEl.style.transform = `translateX(${(-virtualIndex * 100) + (deltaX / vpWidth) * 100}%)`;
          rafId = null;
        });
      }, { passive: true });

      viewport.addEventListener('touchend', function() {
        if (!dragging) return;
        const elapsed = Date.now() - startTime;
        const velocity = Math.abs(deltaX) / elapsed;
        const threshold = velocity > 0.3 ? 20 : 50;
        const dir = deltaX;
        endDrag();
        if (Math.abs(dir) > threshold) {
          dir < 0 ? nextSlide() : prevSlide();
        } else {
          updateCarousel();
        }
      });

      // タッチキャンセル（iOS端ジェスチャー等）
      viewport.addEventListener('touchcancel', function() {
        if (!dragging) return;
        updateCarousel();
        endDrag();
      });
    }

    // スワイプヒント
    function initSwipeHint() {
      if (localStorage.getItem('bp-swipe-hint-seen')) return;
      const hint = document.getElementById('swipe-hint');
      hint.style.display = 'flex';
      function dismiss() {
        hint.style.opacity = '0';
        setTimeout(() => { hint.style.display = 'none'; }, 500);
        localStorage.setItem('bp-swipe-hint-seen', '1');
        hint.removeEventListener('click', dismiss);
      }
      hint.addEventListener('click', dismiss);
      setTimeout(dismiss, 4000);
    }

    // 分析詳細トグル（スライドごと）
    function toggleAnalysis(index) {
      const detail = document.getElementById('analysis-detail-' + index);
      const icon = document.getElementById('analysis-icon-' + index);
      detail.classList.toggle('hidden');
      icon.className = detail.classList.contains('hidden')
        ? 'fa-solid fa-chevron-down text-xs'
        : 'fa-solid fa-chevron-up text-xs';
    }
  </script>
</body>
</html>
